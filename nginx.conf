server {
    listen 8080;
    server_name localhost;

    # ── Compression: Gzip (Brotli requires extra Nginx module; gzip covers all browsers) ──
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2
        font/woff
        font/ttf;

    root /usr/share/nginx/html;
    index index.html;

    # ── HTTP/2 Server Push for LCP critical resources ──
    # Preload the WebP hero image before the browser even parses HTML
    add_header Link "</images/hero-couple.webp>; rel=preload; as=image; type=image/webp" always;
    # Preload the main JS bundle (Vite entry point)
    # add_header Link "</_main.js>; rel=preload; as=script" always;

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Long-term immutable cache for Vite content-hashed assets ──
    # Vite appends a content hash (e.g. main-abc123.js) so these are safe to cache forever.
    location ~* \.(js|css|webp|avif|png|jpg|jpeg|svg|woff2|woff|ttf|ico|gif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding, Accept";
        try_files $uri =404;
    }

    # ── Never cache HTML (SPA routing needs fresh index.html) ──
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── SPA fallback: all routes serve index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
